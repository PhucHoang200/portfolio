name: Deploy Portfolio

on:
  push:
    branches:
      - main  # Hoặc 'master' tùy tên nhánh chính của bạn

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 18 # Khuyên dùng v18 để ổn định với React 17/18
          cache: 'npm'

      - name: Install Dependencies 📦
        # Sử dụng flag bạn đã dùng để sửa lỗi xung đột peer deps
        run: npm install --legacy-peer-deps

      - name: Build Project 🏗️
        run: npm run build
        env:
          CI: false # Tránh build thất bại do các cảnh báo (warnings) nhỏ

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build # Thư mục chứa code sau khi build
          branch: gh-pages # Nhánh mà GitHub Pages sẽ dùng để chạy web
